version: '3.8'

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build:
      context: .
      dockerfile: dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/reportes-banco
      - PORT=3000
    depends_on:
      - mongodb

volumes:
  mongodb_data:
